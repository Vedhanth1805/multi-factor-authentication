<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureVault — MFA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    :root {
      --bg: #05080f;
      --card: rgba(13,20,38,.92);
      --border: rgba(99,102,241,.2);
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --green: #10b981;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 5%, rgba(99,102,241,.22) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 85% 95%, rgba(139,92,246,.15) 0%, transparent 55%);
      pointer-events:none;
    }
    #root { width:100%; display:flex; align-items:center; justify-content:center; padding:20px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%; max-width: 420px;
      backdrop-filter: blur(24px);
      box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04) inset;
      animation: up .3s ease both;
    }
    @keyframes up { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }

    .logo { font-size:.75rem; font-weight:700; letter-spacing:.2em; color:var(--accent); text-transform:uppercase; margin-bottom:28px; }
    h1 { font-size:1.65rem; font-weight:800; margin-bottom:5px; }
    .sub { color:var(--muted); font-size:.88rem; margin-bottom:30px; }

    label { display:block; font-size:.78rem; color:#94a3b8; font-weight:600; letter-spacing:.05em; text-transform:uppercase; margin-bottom:7px; }
    input {
      width:100%; background:rgba(15,23,42,.8); border:1px solid #1e293b;
      border-radius:12px; padding:13px 15px; color:var(--text);
      font-size:.95rem; font-family:inherit; outline:none; margin-bottom:18px;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.18); }

    .btn {
      width:100%; padding:14px; border:none; border-radius:12px;
      font-size:.95rem; font-weight:700; font-family:inherit; cursor:pointer;
      transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
    .btn-primary:hover:not(:disabled) { filter:brightness(1.12); transform:translateY(-1px); box-shadow:0 10px 28px rgba(99,102,241,.4); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-ghost { background:transparent; color:var(--muted); font-size:.85rem; margin-top:14px; }
    .btn-ghost:hover { color:var(--text); }

    .err { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.35); color:#fca5a5; padding:11px 14px; border-radius:11px; font-size:.84rem; margin-bottom:18px; }
    .ok  { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.3); color:#6ee7b7; padding:11px 14px; border-radius:11px; font-size:.84rem; margin-bottom:18px; }

    /* Steps indicator */
    .steps { display:flex; align-items:center; gap:8px; margin-bottom:28px; }
    .step-dot { width:10px; height:10px; border-radius:50%; background:#1e293b; transition:.3s; }
    .step-dot.active { background:var(--accent); box-shadow:0 0 10px rgba(99,102,241,.6); }
    .step-dot.done { background:var(--green); }
    .step-line { flex:1; height:2px; background:#1e293b; }
    .step-label { font-size:.75rem; color:var(--muted); font-weight:600; }

    /* Camera */
    .cam-wrap {
      position:relative; width:100%; border-radius:16px;
      overflow:hidden; background:#000; aspect-ratio:4/3; margin-bottom:16px;
    }
    .cam-wrap video, .cam-wrap canvas { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .face-ring {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;
    }
    .face-ring::after {
      content:''; display:block; width:170px; height:220px;
      border:2.5px solid var(--accent); border-radius:50%;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.5), 0 0 30px rgba(99,102,241,.5);
      animation: rp 2s ease-in-out infinite;
    }
    @keyframes rp {
      0%,100%{ border-color:var(--accent); box-shadow:0 0 0 9999px rgba(0,0,0,.5),0 0 20px rgba(99,102,241,.4); }
      50%    { border-color:var(--accent2);box-shadow:0 0 0 9999px rgba(0,0,0,.5),0 0 40px rgba(139,92,246,.8); }
    }
    .cam-status { text-align:center; font-size:.85rem; color:var(--muted); margin-bottom:14px; font-weight:500; }
    .cam-status.on { color:var(--green); }

    /* Fingerprint */
    .fp-center { text-align:center; padding:28px 0 20px; }
    .fp-icon { font-size:5rem; display:block; animation: fpp 1.8s ease-in-out infinite; margin-bottom:10px; }
    @keyframes fpp { 0%,100%{opacity:.45;transform:scale(.95)} 50%{opacity:1;transform:scale(1.08)} }

    /* Dashboard MFA box */
    .mfa-banner {
      background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(139,92,246,.08));
      border:1px solid rgba(99,102,241,.25); border-radius:14px;
      padding:18px 20px; margin-bottom:20px;
    }
    .mfa-row { display:flex; align-items:center; gap:12px; margin-top:10px; }
    .mfa-chip { padding:5px 12px; border-radius:20px; font-size:.75rem; font-weight:700;
      background:rgba(16,185,129,.15); color:#34d399; border:1px solid rgba(16,185,129,.3); }

    .divider { display:flex; align-items:center; gap:10px; margin:18px 0; color:#1e293b; font-size:.8rem; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:#1e293b; }
    .top-bar { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:26px; }
    .top-bar h1 { margin:0; }

    /* Login tabs */
    .login-tabs { display:flex; background:rgba(15,23,42,.8); border-radius:12px; padding:4px; margin-bottom:26px; }
    .login-tab { flex:1; padding:9px 0; border:none; border-radius:9px; font-family:inherit;
      font-size:.82rem; font-weight:600; cursor:pointer; transition:all .2s;
      background:transparent; color:var(--muted); }
    .login-tab.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
      box-shadow:0 4px 14px rgba(99,102,241,.35); }

    /* OTP digit input */
    .otp-input { letter-spacing:.35em; font-size:1.4rem; font-weight:700; text-align:center;
      padding:14px 15px; font-family:monospace; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const API = "http://localhost:8000";
const MODELS = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";

// ── API helper ────────────────────────────────────────────────────────────────
async function req(path, opts={}, tok=null){
  const hdrs = {"Content-Type":"application/json"};
  if(tok) hdrs["Authorization"]=`Bearer ${tok}`;
  const r = await fetch(`${API}${path}`,{...opts,headers:{...hdrs,...(opts.headers||{})}});
  const d = await r.json();
  if(!r.ok) throw new Error(d.detail||"Error");
  return d;
}

// ── Base64url helpers ─────────────────────────────────────────────────────────
const b64u  = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
const ub64  = s   => { s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4)s+="="; return Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer; };

// ── WebAuthn helpers ──────────────────────────────────────────────────────────
async function webauthnCreate(opts){
  opts.challenge = ub64(opts.challenge);
  opts.user.id   = ub64(opts.user.id);
  if(opts.excludeCredentials) opts.excludeCredentials = opts.excludeCredentials.map(c=>({...c,id:ub64(c.id)}));
  const cred = await navigator.credentials.create({publicKey:opts});
  return {
    id:cred.id, rawId:b64u(cred.rawId), type:cred.type,
    response:{
      clientDataJSON:   b64u(cred.response.clientDataJSON),
      attestationObject:b64u(cred.response.attestationObject),
    }
  };
}
async function webauthnGet(opts){
  opts.challenge = ub64(opts.challenge);
  if(opts.allowCredentials) opts.allowCredentials = opts.allowCredentials.map(c=>({...c,id:ub64(c.id)}));
  const cred = await navigator.credentials.get({publicKey:opts});
  return {
    id:cred.id, rawId:b64u(cred.rawId), type:cred.type,
    response:{
      clientDataJSON:   b64u(cred.response.clientDataJSON),
      authenticatorData:b64u(cred.response.authenticatorData),
      signature:        b64u(cred.response.signature),
      userHandle:       cred.response.userHandle ? b64u(cred.response.userHandle) : null,
    }
  };
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [token,    setToken]    = useState(localStorage.getItem("tok")||null);
  const [preToken, setPreToken] = useState(null);
  const [fpToken,  setFpToken]  = useState(null);
  const [setupFpTok, setSetupFpTok] = useState(null);

  // Detect reset-password link (e.g. /reset-password?token=xxx)
  const isReset = window.location.pathname.includes("reset-password") && window.location.search.includes("token=");
  const [view, setView] = useState(isReset ? "reset_password" : (token ? "dashboard" : "login"));

  const loggedIn = t => { setToken(t); localStorage.setItem("tok",t); setView("dashboard"); };
  const logout   = () => { setToken(null); localStorage.removeItem("tok"); setView("login"); };

  const p = { token, preToken, setPreToken, fpToken, setFpToken, setupFpTok, setSetupFpTok, loggedIn, logout, setView };
  return <>
    {view==="login"          && <Login       {...p}/>}
    {view==="otp_login"      && <OtpLogin    {...p}/>}
    {view==="forgot"         && <ForgotPassword {...p}/>}
    {view==="reset_password" && <ResetPassword {...p}/>}
    {view==="register"       && <Register    {...p}/>}
    {view==="dashboard"      && <Dashboard   {...p}/>}
    {view==="setup_fp"       && <SetupFp     {...p}/>}
    {view==="setup_face"     && <SetupFace   {...p}/>}
    {view==="verify_fp"      && <VerifyFp    {...p}/>}
    {view==="verify_face"    && <VerifyFace  {...p}/>}
    {view==="success"        && <Success     {...p}/>}
  </>;
}

// ── Login ─────────────────────────────────────────────────────────────────────
function Login({setView, setPreToken}){
  const [em,setEm]=useState(""); const [pw,setPw]=useState("");
  const [err,setErr]=useState("");

  const submit = async e=>{
    e.preventDefault(); setErr("");
    try{
      const r = await req("/auth/login",{method:"POST",body:JSON.stringify({email:em,password:pw})});
      setPreToken(r.pre_token);
      if(r.setup_required) setView("setup_fp");
      else setView("verify_fp");
    } catch(e){ setErr(e.message); }
  };

  return <div className="card">
    <div className="logo">🔐 SecureVault</div>
    <h1>Welcome Back</h1>
    <p className="sub">Choose how you want to sign in</p>
    <div className="login-tabs">
      <button className="login-tab active">🔑 Password</button>
      <button className="login-tab" onClick={()=>setView("otp_login")}>📱 OTP</button>
    </div>
    {err && <div className="err">{err}</div>}
    <form onSubmit={submit}>
      <label>Email Address</label>
      <input type="email" value={em} onChange={e=>setEm(e.target.value)} required placeholder="you@company.com"/>
      <label>Password</label>
      <input type="password" value={pw} onChange={e=>setPw(e.target.value)} required placeholder="••••••••"/>
      <button className="btn btn-primary">Sign In →</button>
    </form>
    <button className="btn btn-ghost" style={{marginTop:8,color:"#6366f1",fontSize:".83rem"}} onClick={()=>setView("forgot")}>
      🔒 Forgot Password?
    </button>
    <div className="divider">new here?</div>
    <button className="btn btn-ghost" onClick={()=>setView("register")}>Create Account</button>
  </div>;
}

// ── OTP Login (mobile number, passwordless) ───────────────────────────────────
function OtpLogin({setView, loggedIn, setPreToken}){
  const [phone,setPhone]=useState("");
  const [otp,setOtp]=useState("");
  const [step,setStep]=useState(1);
  const [err,setErr]=useState(""); const [ok,setOk]=useState("");
  const [busy,setBusy]=useState(false);

  const sendOtp = async e=>{
    e.preventDefault(); setErr(""); setOk(""); setBusy(true);
    try{
      await req("/auth/otp/request",{method:"POST",body:JSON.stringify({phone})});
      setOk("OTP sent to your mobile! Check SMS (or server terminal in demo mode).");
      setStep(2);
    } catch(e){ setErr(e.message); }
    finally{ setBusy(false); }
  };

  const verifyOtp = async e=>{
    e.preventDefault(); setErr(""); setBusy(true);
    try{
      const r = await req("/auth/otp/verify",{method:"POST",body:JSON.stringify({phone,otp_code:otp})});
      if(r.token_type === "pre_auth"){
        setPreToken(r.access_token);
        setView("verify_fp");
      }else{
        loggedIn(r.access_token);
      }
    } catch(e){ setErr(e.message); }
    finally{ setBusy(false); }
  };

  return <div className="card">
    <div className="logo">🔐 SecureVault</div>
    <h1>OTP Login</h1>
    <p className="sub">Sign in with a one-time SMS code</p>
    <div className="login-tabs">
      <button className="login-tab" onClick={()=>setView("login")}>🔑 Password</button>
      <button className="login-tab active">📱 OTP</button>
    </div>
    {err && <div className="err">{err}</div>}
    {ok  && <div className="ok">{ok}</div>}

    {step===1 && <form onSubmit={sendOtp}>
      <label>Mobile Number</label>
      <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} required placeholder="+91 9876543210" style={{letterSpacing:".05em"}}/>
      <p style={{color:"#64748b",fontSize:".78rem",marginTop:-12,marginBottom:16}}>Enter the number you registered with</p>
      <button className="btn btn-primary" disabled={busy}>
        {busy ? "Sending…" : "📱 Send OTP →"}
      </button>
    </form>}

    {step===2 && <form onSubmit={verifyOtp}>
      <label>6-Digit OTP Code</label>
      <input className="otp-input" type="text" value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,"").slice(0,6))}
        required placeholder="······" maxLength={6} inputMode="numeric" autoFocus/>
      <p style={{color:"#64748b",fontSize:".8rem",textAlign:"center",marginBottom:16,marginTop:-10}}>
        📲 Check your SMS &nbsp;·&nbsp; <strong style={{color:"#a5b4fc"}}>server terminal</strong> in demo mode
      </p>
      <button className="btn btn-primary" disabled={busy||otp.length<6}>
        {busy ? "Verifying…" : "✅ Verify OTP →"}
      </button>
      <button type="button" className="btn btn-ghost" onClick={()=>{setStep(1);setOtp("");setErr("");setOk("");}}>← Different number</button>
    </form>}

    <div className="divider">password login?</div>
    <button className="btn btn-ghost" onClick={()=>setView("login")}>← Back to Sign In</button>
  </div>;
}

// ── Forgot Password ───────────────────────────────────────────────────────────
function ForgotPassword({setView}){
  const [em,setEm]=useState("");
  const [err,setErr]=useState(""); const [ok,setOk]=useState("");
  const [busy,setBusy]=useState(false);

  const submit = async e=>{
    e.preventDefault(); setErr(""); setOk(""); setBusy(true);
    try{
      await req("/auth/forgot-password",{method:"POST",body:JSON.stringify({email:em})});
      setOk("If that email is registered, a reset link has been sent. Check your inbox.");
    } catch(e){ setErr(e.message); }
    finally{ setBusy(false); }
  };

  return <div className="card">
    <div className="logo">🔐 SecureVault</div>
    <h1>Reset Password</h1>
    <p className="sub">We'll email you a secure reset link</p>
    {err && <div className="err">{err}</div>}
    {ok  && <div className="ok">{ok}</div>}
    <form onSubmit={submit}>
      <label>Email Address</label>
      <input type="email" value={em} onChange={e=>setEm(e.target.value)} required placeholder="you@company.com"/>
      <button className="btn btn-primary" disabled={busy}>
        {busy ? "Sending…" : "📧 Send Reset Link →"}
      </button>
    </form>
    <div className="divider" />
    <button className="btn btn-ghost" onClick={()=>setView("login")}>← Back to Sign In</button>
  </div>;
}

// ── Register ─────────────────────────────────────────────────────────────────
function Register({setView}){
  const [em,setEm]=useState(""); const [pw,setPw]=useState("");
  const [phone,setPhone]=useState("");
  const [err,setErr]=useState(""); const [ok,setOk]=useState("");
  const submit = async e=>{
    e.preventDefault(); setErr(""); setOk("");
    try{
      await req("/register",{method:"POST",body:JSON.stringify({email:em,password:pw,phone})});
      setOk("Account created! Redirecting to login…");
      setTimeout(()=>setView("login"),1400);
    } catch(e){ setErr(e.message); }
  };
  return <div className="card">
    <div className="logo">🔐 SecureVault</div>
    <h1>Create Account</h1>
    <p className="sub">Get started — you'll set up biometric MFA after login</p>
    {err && <div className="err">{err}</div>}
    {ok  && <div className="ok">{ok}</div>}
    <form onSubmit={submit}>
      <label>Email Address</label>
      <input type="email" value={em} onChange={e=>setEm(e.target.value)} required placeholder="you@company.com"/>
      <label>Password</label>
      <input type="password" value={pw} onChange={e=>setPw(e.target.value)} required minLength="6" placeholder="Min 6 characters"/>
      <label>Mobile Number <span style={{color:"#64748b",fontSize:".75rem",fontWeight:400}}>(optional — for OTP login)</span></label>
      <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+91 9876543210"/>
      <button className="btn btn-primary">Create Account →</button>
    </form>
    <div className="divider">have an account?</div>
    <button className="btn btn-ghost" onClick={()=>setView("login")}>Sign In</button>
  </div>;
}

// ── Reset Password (linked from email) ────────────────────────────────────────
function ResetPassword({setView}){
  const [pw,setPw]=useState(""); const [pw2,setPw2]=useState("");
  const [err,setErr]=useState(""); const [ok,setOk]=useState("");
  const [busy,setBusy]=useState(false);
  const token = new URLSearchParams(window.location.search).get("token")||"";

  const submit = async e=>{
    e.preventDefault(); setErr("");
    if(pw!==pw2){ setErr("Passwords do not match."); return; }
    setBusy(true);
    try{
      await req("/auth/reset-password",{method:"POST",body:JSON.stringify({token,new_password:pw})});
      setOk("Password updated! You can now sign in.");
      setTimeout(()=>{ window.history.replaceState({},"","/"); setView("login"); },2000);
    } catch(e){ setErr(e.message); }
    finally{ setBusy(false); }
  };

  return <div className="card">
    <div className="logo">🔐 SecureVault</div>
    <h1>New Password</h1>
    <p className="sub">Choose a strong password for your account</p>
    {!token && <div className="err">Missing reset token. Please use the link from your email.</div>}
    {err && <div className="err">{err}</div>}
    {ok  && <div className="ok">{ok}</div>}
    <form onSubmit={submit}>
      <label>New Password</label>
      <input type="password" value={pw} onChange={e=>setPw(e.target.value)} required minLength="6" placeholder="Min 6 characters" disabled={!token}/>
      <label>Confirm Password</label>
      <input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} required minLength="6" placeholder="Repeat password" disabled={!token}/>
      <button className="btn btn-primary" disabled={busy||!token}>
        {busy ? "Saving…" : "🔐 Set New Password →"}
      </button>
    </form>
    <div className="divider"/>
    <button className="btn btn-ghost" onClick={()=>setView("login")}>← Back to Sign In</button>
  </div>;
}

// ── Step Progress ─────────────────────────────────────────────────────────────
function Steps({step}){
  // step: 1 = fingerprint, 2 = face
  return <div className="steps">
    <div className={`step-dot ${step>=1?"active":""} ${step>1?"done":""}`}/>
    <div className="step-line"/>
    <div className={`step-dot ${step>=2?"active":""}`}/>
    <div style={{marginLeft:6,fontSize:".75rem",color:"#64748b",fontWeight:600}}>
      Step {step} of 2
    </div>
  </div>;
}

// ── Setup: Fingerprint (Step 1) ───────────────────────────────────────────────
function SetupFp({preToken, setSetupFpTok, setView}){
  const [status, setStatus]=useState("Ready");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  const run = async ()=>{
    setErr(""); setLoading(true);
    try{
      setStatus("Getting options…");
      const opts = await req("/auth/mfa/setup/webauthn/begin",{method:"POST"},preToken);
      setStatus("Touch your fingerprint sensor / Touch ID…");
      const cred = await webauthnCreate(opts);
      setStatus("Saving fingerprint…");
      const r = await req("/auth/mfa/setup/webauthn/complete",{method:"POST",body:JSON.stringify(cred)},preToken);
      setSetupFpTok(r.setup_fp_token);
      setView("setup_face");
    } catch(e){ setErr(e.message); setStatus("Ready"); }
    finally{ setLoading(false); }
  };

  return <div className="card">
    <div className="logo">🔐 Setup MFA — First Time</div>
    <Steps step={1}/>
    <h1>Register Fingerprint</h1>
    <p className="sub">Your fingerprint will be permanently linked to your account</p>
    {err && <div className="err">{err}</div>}
    <div className="fp-center">
      <span className="fp-icon">👆</span>

    <button className="btn btn-primary" onClick={run} disabled={loading}>
      {loading?"Waiting for sensor…":"Register Fingerprint →"}
    </button>
  </div>;
}

// ── Setup: Face (Step 2) ──────────────────────────────────────────────────────
function SetupFace({setupFpTok, loggedIn, setView}){
  const videoRef=useRef(null); const streamRef=useRef(null); const ivRef=useRef(null);
  const [detected,setDetected]=useState(false);
  const [status,setStatus]=useState("Loading face models…");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  const stop=()=>{ clearInterval(ivRef.current); streamRef.current?.getTracks().forEach(t=>t.stop()); };

  useEffect(()=>{
    let alive=true;
    (async()=>{
      try{
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODELS),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODELS),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODELS),
        ]);
        if(!alive) return;
        setStatus("Starting camera…");
        const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
        streamRef.current=stream;
        if(!alive){ stream.getTracks().forEach(t=>t.stop()); return; }
        videoRef.current.srcObject=stream;
        await new Promise(r=>videoRef.current.onloadedmetadata=r);
        setStatus("Position your face in the circle…");
        ivRef.current=setInterval(async()=>{
          if(!videoRef.current||!alive) return;
          const d=await faceapi.detectSingleFace(videoRef.current,new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
          if(!alive) return;
          if(d){ setDetected(true); setStatus("Face in frame — ready to scan"); }
          else  { setDetected(false); setStatus("Position your face in the circle…"); }
        },400);
      } catch(e){ if(alive) setErr(e.message); }
    })();
    return ()=>{ alive=false; stop(); };
  },[]);

  // Capture average of 3 descriptors for setup accuracy (retries on missed frames)
  const captureDescriptorSetup = async () => {
    const samples = [];
    for(let i=0; i<3; i++){
      let d = null;
      for(let attempt=0; attempt<5 && !d; attempt++){
        d = await faceapi.detectSingleFace(videoRef.current, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if(!d) await new Promise(r=>setTimeout(r,200));
      }
      if(!d) throw new Error("Could not capture face clearly. Hold still and try again.");
      samples.push(Array.from(d.descriptor));
      await new Promise(r=>setTimeout(r,120));
    }
    return samples[0].map((_,i)=>samples.reduce((s,d)=>s+d[i],0)/samples.length);
  };

  const capture = async ()=>{
    setErr(""); setLoading(true);
    try{
      const descriptor = await captureDescriptorSetup();
      const r=await req("/auth/mfa/setup/face",{method:"POST",body:JSON.stringify({face_descriptor:descriptor})},setupFpTok);
      stop(); loggedIn(r.access_token);
    } catch(e){ setErr(e.message); }
    finally{ setLoading(false); }
  };

  return <div className="card">
    <div className="logo">🔐 Setup MFA — Final Step</div>
    <Steps step={2}/>
    <h1>Register Face</h1>
    <p className="sub">Look directly at the camera — this is your permanent face lock</p>
    {err && <div className="err">{err}</div>}
    <div className="cam-wrap">
      <video ref={videoRef} autoPlay playsInline muted/>
      <div className="face-ring"/>
    </div>
    <p className={`cam-status ${detected?"on":""}`}>{status}</p>
    <button className="btn btn-primary" onClick={capture} disabled={!detected||loading}>
      {loading?"Saving Face…":"🤳 Register My Face →"}
    </button>
  </div>;
}

// ── Verify: Fingerprint (Login Step 1) ───────────────────────────────────────
function VerifyFp({preToken, setFpToken, setView}){
  const [status,setStatus]=useState("Ready");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  const run = async ()=>{
    setErr(""); setLoading(true);
    try{
      setStatus("Getting challenge…");
      const opts = await req("/auth/mfa/verify/webauthn/begin",{method:"POST"},preToken);
      setStatus("Touch your fingerprint sensor / Touch ID…");
      const cred = await webauthnGet(opts);
      setStatus("Verifying…");
      const r = await req("/auth/mfa/verify/webauthn/complete",{method:"POST",body:JSON.stringify(cred)},preToken);
      setFpToken(r.fp_token);
      setView("verify_face");
    } catch(e){ setErr(e.message); setStatus("Ready"); }
    finally{ setLoading(false); }
  };

  return <div className="card">
    <div className="logo">🔐 Verification — Step 1 of 2</div>
    <Steps step={1}/>
    <h1>Fingerprint Check</h1>
    <p className="sub">Touch your fingerprint sensor to continue</p>
    {err && <div className="err">{err}</div>}
    <div className="fp-center">
      <span className="fp-icon">{loading?"⏳":"👆"}</span>
      <p style={{color:"#64748b",fontSize:".88rem"}}>{status}</p>
    </div>
    <button className="btn btn-primary" onClick={run} disabled={loading}>
      {loading?"Waiting…":"Scan Fingerprint →"}
    </button>
    <button className="btn btn-ghost" onClick={()=>setView("login")}>← Back</button>
  </div>;
}
